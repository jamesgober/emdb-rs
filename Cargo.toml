[package]
name = "emdb"
version = "0.6.0"
edition = "2021"
rust-version = "1.75"
readme = "README.md"
license = "Apache-2.0"

authors = [
    "James Gober <me@jamesgober.com>"
]

description = "A lightweight, high-performance embedded database for Rust."

keywords = [
    "database",
    "embedded",
    "storage",
    "kv",
    "db"
]

categories = [
    "database",
    "database-implementations",
    "data-structures",
    "caching"
]

documentation = "https://docs.rs/emdb"
repository = "https://github.com/jamesgober/emdb-rs"
homepage = "https://github.com/jamesgober/emdb-rs"

# Configuration for docs.rs
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
crc32fast = "1.4"
fs4 = "0.8"
# Optional WAL-record compression. lz4_flex is pure Rust, ~30% size of zstd's
# binary, and tuned for the small-record sizes typical of a KV WAL.
lz4_flex = { version = "0.11", default-features = false, optional = true }
redb = { version = "2.1", optional = true }
redis = { version = "0.27", optional = true }
sled = { version = "0.34", optional = true }
rocksdb = { version = "0.22", optional = true }

[target.'cfg(unix)'.dependencies]
# Optional mmap-backed reads for the v0.6 page pager.
memmap2 = { version = "0.9", optional = true }

[target.'cfg(windows)'.dependencies]
# Optional mmap-backed reads for the v0.6 page pager.
memmap2 = { version = "0.9", optional = true }

[dev-dependencies]
criterion = { version = "0.5", default-features = false }

[features]
default = ["ttl"]
ttl = []
nested = []
mmap = ["dep:memmap2"]
# WAL-record compression via lz4_flex. Records below COMPRESS_MIN_BYTES bypass
# compression to avoid the per-record overhead on already-small payloads.
compress = ["dep:lz4_flex"]
# Reserved feature gate for AES-GCM at-rest encryption. The on-disk format
# decisions, key-management story, and WAL-vs-page-body trade-offs need a
# focused session before this can ship; the feature flag exists today so
# downstream Cargo.toml entries can opt in early without breaking when the
# implementation lands.
encrypt = []
bench-compare = ["dep:redb", "dep:sled"]
bench-redis = ["dep:redis"]
bench-rocksdb = ["dep:rocksdb"]

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"

[profile.bench]
opt-level = 3
lto = "fat"
codegen-units = 1

[[bench]]
name = "kv"
harness = false

[[bench]]
name = "persistence"
harness = false

[[bench]]
name = "transactions"
harness = false

[[bench]]
name = "concurrency"
harness = false

[[bench]]
name = "comparative"
harness = false
